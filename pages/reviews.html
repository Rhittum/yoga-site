<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">

		<meta name="description" content="Read reviews from students at Ritambhara Holistic Yoga and Nature Care in Yamuna Nagar, Haryana. Share your own experience with Dr. Inderjeet Kaur's yoga classes.">

		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		<link
				href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Manrope:wght@400;500;600;700&display=swap"
				rel="stylesheet"
				>
				<link rel="icon" type="image/svg+xml" href="../resources/images/logo.svg">
				<link rel="stylesheet" href="../styles.css">
	</head>
		<body data-page="reviews">
			<div class="site-aura"></div>

			<header class="site-header">
    <a class="brand" href="../index.html">
					<span class="brand-mark">ॐ</span>
					<span>
						<strong>Ritambhara Holistic Yoga and Nature Care</strong>
						<small>Yoga Centre</small>
					</span>
				</a>

				<button class="nav-toggle" aria-expanded="false" aria-label="Toggle navigation">
					<span></span>
					<span></span>
				</button>

				<nav class="site-nav">
      <a href="../index.html">Home</a>
					<a href="about.html">About</a>
					<a href="classes.html">Classes</a>
					<a href="reviews.html">Reviews</a>
					<a href="contact.html">Contact</a>
				</nav>
			</header>

			<main class="page-main">
				<section class="page-hero section">
					<div class="reveal">
						<div class="review-frame">
							<h2 class="review-title">
								<span>Our customer's reviews <img src="/resources/images/hands-praying-solid-full.svg" width="25" style="display: inline-flex; align-items: center; gap: 10px;"></img></span>
							</h2>
							<div class="review-grid"></div>
						</div>
						<button class="button review-add-btn">Add Your Review</button>
					</div>
				</section>
			</main>

			<div class="review-modal-overlay">
				<div class="review-modal">
					<button class="review-modal-close" aria-label="Close">&times;</button>
					<h2>Share Your Review</h2>
					<form class="review-form">
						<label>
							Rating
							<div class="star-rating" role="radiogroup" aria-label="Rating">
								<span class="star" data-value="1" role="radio" aria-label="1 star"></span>
								<span class="star" data-value="2" role="radio" aria-label="2 stars"></span>
								<span class="star" data-value="3" role="radio" aria-label="3 stars"></span>
								<span class="star" data-value="4" role="radio" aria-label="4 stars"></span>
								<span class="star" data-value="5" role="radio" aria-label="5 stars"></span>
							</div>
						</label>
						<label>
							Name
							<input type="text" name="name" placeholder="Your name">
						</label>
						<label>
							Phone
							<input type="tel" name="phone" placeholder="Your phone number">
						</label>
						<label>
							Review
							<textarea name="review" rows="4" placeholder="Tell us about your experience"></textarea>
						</label>
						<button class="button" type="submit">Submit Review</button>
					</form>
				</div>
			</div>

			<div style="background-color: beige;" class="socials">
				<ul>
					<li>  
						<a href="https://www.instagram.com/ritambharaholistic" class="social-icon"><img src="../resources/images/instagram-brands-solid-full.svg" alt="instagram" width="30">@ritambharaholistic</a>
					</li>
					<li>  
						<a href="mailto:inderjeetkaur866@gmail.com" class="social-icon"><img src="../resources/images/envelope-solid-full(1).svg" alt="mail" width="30">inderjeetkaur866@gmail.com</a>
					</li>
					<li>  
						<p class="social-icon"><img src="../resources/images/whatsapp-brands-solid-full(1).svg" alt="whatsapp" width="30">+91 79882 99200</p>
					</li>
				</ul>
				<br>
				<footer class="site-footer">
					<p>Ritambhara Nature Care Yoga Centre</p>
					<p>A place to relax and take care of your body</p>
				</footer>
			</div>

			<script src="../script.js" defer></script>
