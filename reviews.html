<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | Ritambhara Nature Care Yoga Centre</title>
  <meta name="description" content="Contact and visit page for a calm yoga centre website template.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Manrope:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  >
  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="reviews">
  <div class="site-aura"></div>

  <header class="site-header">
    <a class="brand" href="index.html">
      <span class="brand-mark">ॐ</span>
      <span>
        <strong>Ritambhara Holistic Yoga and Nature Care</strong>
        <small>Yoga Centre</small>
      </span>
    </a>

    <button class="nav-toggle" aria-expanded="false" aria-label="Toggle navigation">
      <span></span>
      <span></span>
    </button>

    <nav class="site-nav">
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="classes.html">Classes</a>
      <a href="reviews.html">Reviews</a>
      <a href="contact.html">Contact</a>
    </nav>
  </header>

  <main class="page-main">
    <section class="page-hero section">
	    <div class="reveal">
		    <div class="review-frame">
			    <h2 class="review-title">
				    <span>Our customer's reviews </span>
				    <img src="images/hands-praying-solid-full.svg" alt="praying-hands" width="25" style="display: inline-flex; align-items: center; gap: 10px;">
			    </h2>
			    <div class="review-grid"></div>
		    </div>
		    <button class="button review-add-btn">Add Your Review</button>
      </div>
    </section>
  </main>

  <div class="review-modal-overlay">
    <div class="review-modal">
      <button class="review-modal-close" aria-label="Close">&times;</button>
      <h2>Share Your Review</h2>
      <form class="review-form">
        <label>
          Name
          <input type="text" name="name" placeholder="Your name">
        </label>
        <label>
          Phone
          <input type="tel" name="phone" placeholder="Your phone number">
        </label>
        <label>
          Review
          <textarea name="review" rows="4" placeholder="Tell us about your experience"></textarea>
        </label>
        <button class="button" type="submit">Submit Review</button>
      </form>
    </div>
  </div>

  <footer class="site-footer">
    <p>Ritambhara Nature Care Yoga Centre</p>
    <p>Ready for your real contact details and enrollment flow.</p>
  </footer>

  <script src="script.js" defer></script>
</body>
</html>
