<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FCF7ED"/>
      <stop offset="100%" stop-color="#E8DFCC"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="4" dy="6" stdDeviation="10" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
    <path id="petal" d="M0,0 C-32,-50 -42,-110 0,-160 C42,-110 32,-50 0,0Z"/>
  </defs>

  <rect x="20" y="10" width="360" height="360" rx="45" fill="url(#grad)" filter="url(#shadow)"/>

  <rect x="20" y="10" width="360" height="360" rx="45" fill="none" stroke="#FFFFFF" stroke-opacity="0.5" stroke-width="2.5"/>
  <rect x="21" y="11" width="358" height="358" rx="44" fill="none" stroke="#D4C9B5" stroke-opacity="0.35" stroke-width="1.5"/>

  <g transform="translate(200, 280) scale(1.5)">
    <use href="#petal" transform="rotate(-50)" fill="#C4DFA6" opacity="0.8"/>
    <use href="#petal" transform="rotate(50)" fill="#C4DFA6" opacity="0.8"/>
    <use href="#petal" transform="rotate(-30)" fill="#A8D08D"/>
    <use href="#petal" transform="rotate(30)" fill="#A8D08D"/>
    <use href="#petal" transform="rotate(-12)" fill="#93C572"/>
    <use href="#petal" transform="rotate(12)" fill="#93C572"/>
    <use href="#petal" fill="#7CB342"/>

    <ellipse cx="0" cy="20" rx="38" ry="10" fill="#689F38" opacity="0.5"/>

    <text x="0" y="-50" text-anchor="middle" font-size="56" fill="#F5EFE0" font-family="serif" font-weight="bold">ॐ</text>
  </g>
</svg>
